name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: |
          python -m py_compile \
            database/database.py \
            database/__init__.py \
            wiki_page_request/wiki_page_request.py \
            wiki_page_request/__init__.py \
            utests/test_database.py \
            utests/test_wiki_page_request.py

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest
